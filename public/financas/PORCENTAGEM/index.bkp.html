<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Porcentagem Reversa | Zinha</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 30px 20px; margin: 0; }
        .container { max-width: 600px; margin: 0 auto; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .input-group { margin: 20px 0; text-align: left; }
        label { display: block; margin-bottom: 8px; color: #333; font-weight: 500; }
        input { width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        input:focus { outline: none; border-color: #1a73e8; }
        button { background: #1a73e8; color: white; border: none; padding: 14px 30px; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; width: 100%; }
        button:hover { background: #1557b0; }
        .resultado { margin-top: 25px; padding: 20px; background: #e8f0fe; border-radius: 10px; text-align: left; }
        .resultado h3 { color: #1a73e8; margin-top: 0; }
        .valor-destaque { font-size: 28px; font-weight: bold; color: #1557b0; margin: 10px 0; }
        a.back { display: inline-block; color: #1a73e8; text-decoration: none; margin-bottom: 20px; font-weight: bold; }
        a.back:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        <a href="/financas/" class="back">← Voltar</a>

        <div class="card">
            <h2>🔍 Calculadora de Porcentagem Reversa</h2>
            <p style="color: #666;">Descubra o valor total quando você conhece apenas uma parte e sua porcentagem.</p>

            <div class="input-group">
                <label for="valorConhecido">Valor Conhecido (R$)</label>
                <input type="number" id="valorConhecido" placeholder="Ex: 300,00" step="0.01" min="0">
            </div>

            <div class="input-group">
                <label for="porcentagem">Porcentagem que representa (%)</label>
                <input type="number" id="porcentagem" placeholder="Ex: 6" step="0.01" min="0.01" max="100">
            </div>

            <button onclick="executarCalculo()">Calcular Valor Base</button>

            <div id="resultado" class="resultado" style="display: none;">
                <h3>Resultado</h3>
                <p>Se <span id="valParcial"></span> representa <span id="percMostrado"></span>%</p>
                <p class="valor-destaque">100% = R$ <span id="valTotal"></span></p>
                <p style="font-size: 13px; color: #666;" id="descricaoCalculo"></p>
            </div>
        </div>
    </div>

    <script>
        const TABELA_IR = [
            { limite: 5000.00, aliquota: 0, deducao: 0 },
            { limite: 6500.00, aliquota: 0.15, deducao: 750.00 },
            { limite: 8000.00, aliquota: 0.225, deducao: 1237.50 },
            { limite: Infinity, aliquota: 0.275, deducao: 1637.50 }
        ];

        const formatarMoeda = (valor) => {
            return Math.round((valor + Number.EPSILON) * 100) / 100;
        };

        function calcularPorcentagemReversa(valorConhecido, porcentagem) {
            if (porcentagem <= 0 || porcentagem > 100) {
                throw new Error('A porcentagem deve estar entre 0,01% e 100%');
            }
            if (valorConhecido < 0) {
                throw new Error('O valor conhecido não pode ser negativo');
            }

            const valorBase = valorConhecido / (porcentagem / 100);

            return {
                valorBase: formatarMoeda(valorBase),
                valorConhecido: formatarMoeda(valorConhecido),
                porcentagem: porcentagem,
                calculo: `${formatarMoeda(valorConhecido)} ÷ ${porcentagem}% = ${formatarMoeda(valorBase)}`
            };
        }

        function calcularIR(rendimentoTributavel) {
            if (rendimentoTributavel < 0) {
                throw new Error('O rendimento tributável não pode ser negativo');
            }

            let faixaAplicada = null;

            for (let i = 0; i < TABELA_IR.length; i++) {
                const faixa = TABELA_IR[i];
                if (rendimentoTributavel <= faixa.limite) {
                    faixaAplicada = faixa;
                    break;
                }
            }

            if (!faixaAplicada) {
                faixaAplicada = TABELA_IR[TABELA_IR.length - 1];
            }

            let impostoDevido;

            if (faixaAplicada.aliquota === 0) {
                impostoDevido = 0;
            } else {
                impostoDevido = (rendimentoTributavel * faixaAplicada.aliquota) - faixaAplicada.deducao;
                impostoDevido = Math.max(0, impostoDevido);
            }

            const aliquotaEfetiva = rendimentoTributavel > 0
                ? (impostoDevido / rendimentoTributavel) * 100
                : 0;

            return {
                rendimentoTributavel: formatarMoeda(rendimentoTributavel),
                impostoDevido: formatarMoeda(impostoDevido),
                aliquotaNominal: faixaAplicada.aliquota,
                aliquotaEfetiva: formatarMoeda(aliquotaEfetiva),
                deducao: formatarMoeda(faixaAplicada.deducao),
                faixa: faixaAplicada.limite === null
                    ? `Acima de R$ ${TABELA_IR[TABELA_IR.length - 2].limite.toFixed(2)}`
                    : `Até R$ ${faixaAplicada.limite.toFixed(2)}`
            };
        }

        function executarCalculo() {
            const valor = parseFloat(document.getElementById('valorConhecido').value);
            const porcentagem = parseFloat(document.getElementById('porcentagem').value);

            if (isNaN(valor) || isNaN(porcentagem)) {
                alert('Preencha todos os campos corretamente');
                return;
            }

            try {
                const resultado = calcularPorcentagemReversa(valor, porcentagem);

                document.getElementById('valParcial').textContent = `R$ ${resultado.valorConhecido}`;
                document.getElementById('percMostrado').textContent = resultado.porcentagem;
                document.getElementById('valTotal').textContent = resultado.valorBase;
                document.getElementById('descricaoCalculo').textContent = resultado.calculo;
                document.getElementById('resultado').style.display = 'block';
            } catch (erro) {
                alert(erro.message);
            }
        }
    </script>
</body>
</html>
